<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Academy</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <!-- Dialogue UI Overlay -->
    <div id="dialogue-ui" class="hidden">
        <h2 id="dialogue-text">Dialogue Text</h2>
        <button id="dialogue-close">OK</button>
    </div>
    <!-- Puzzle UI Overlay -->
    <div id="puzzle-ui" class="hidden">
        <h2 id="puzzle-text">Puzzle Text</h2>
        <div id="puzzle-options"></div>
        <button id="puzzle-close">Run Away</button>
    </div>
    <!-- Ending screen shown after walking out the door -->
    <div id="ending-ui" class="hidden">
        <h1>&#127891; Congratulations!</h1>
        <p>You made all 3 Pokemon happy and finished your first day at the Pokemon Academy!</p>
        <button id="ending-restart" onclick="location.reload()">Play Again</button>
    </div>
    <script src="src/game.js?v=10"></script>

</body>
</html>
