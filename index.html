<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Academy</title>
    <link rel="stylesheet" href="style.css?v=5">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="game-container">
        <!-- Level title card (shown briefly whenever a scene starts) -->
        <div id="level-title"></div>
        <!-- Always-visible Pokedex progress counter -->
        <div id="pokedex-hud">Pokedex: 0/6</div>
        <!-- Background music mute toggle -->
        <button id="music-toggle" title="Toggle music">&#128266;</button>
    </div>
    <!-- Dialogue UI Overlay -->
    <div id="dialogue-ui" class="hidden">
        <h2 id="dialogue-text">Dialogue Text</h2>
        <button id="dialogue-close">OK</button>
    </div>
    <!-- Puzzle UI Overlay -->
    <div id="puzzle-ui" class="hidden">
        <h2 id="puzzle-text">Puzzle Text</h2>
        <div id="puzzle-options"></div>
        <button id="puzzle-close">Run Away</button>
    </div>
    <!-- Ending screen shown after leaving through the school gate -->
    <div id="ending-ui" class="hidden">
        <h1>&#127891; Congratulations!</h1>
        <p>You made all 6 Pokemon happy and graduated from the Pokemon Academy!</p>
        <button id="ending-restart" onclick="location.reload()">Play Again</button>
    </div>
    <script src="src/music.js?v=1"></script>
    <script src="src/game.js?v=16"></script>

</body>
</html>
